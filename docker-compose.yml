
services:
  # Database (Persistent)
  db:
    container_name: academia-db
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-academia}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-academia}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # Development App (Astro with HMR)
  app:
    container_name: academia-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-academia}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-me}
      PORT: 80
      HOST: 0.0.0.0
    ports:
      - "80:80"
    volumes:
      - .:/app
      - /app/node_modules # Evitar sobrescribir node_modules del contenedor con los del host
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "80"]

volumes:
  postgres_data:

networks:
  default:
    name: academia-net
